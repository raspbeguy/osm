name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Build a snapshot (no GitHub release published)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: >-
            ${{ (github.event_name == 'workflow_dispatch' && inputs.snapshot)
                && 'release --clean --snapshot --skip=publish'
                || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: upload snapshot artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.snapshot
        uses: actions/upload-artifact@v4
        with:
          name: osmctl-snapshot
          path: dist/*
